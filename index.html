<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene color-space="sRGB" renderer="colorManagement: true; physicallyCorrectLights: true;">

      <!-- Assets -->
      <a-assets>
        <a-asset-item id="kirby" src="./kirby.glb"></a-asset-item>
      </a-assets>

      <!-- Sky -->
      <a-sky color="#87CEEB"></a-sky>

      <!-- Ground -->
      <a-plane rotation="-90 0 0" height="50" width="50" color="#90EE90"></a-plane>

      <!-- Kirby model -->
      <a-gltf-model
        src="#kirby"
        position="0 0 -3"
        rotation="0 0 0"
        scale="0.5 0.5 0.5">
      </a-gltf-model>

      <!-- Lights -->
      <a-light type="directional" intensity="2.5" position="0 2 3"></a-light>
      <a-light type="ambient" intensity="0.5"></a-light>

    </a-scene>
  </body>
</html>
